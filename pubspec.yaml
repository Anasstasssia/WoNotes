name: wonotes
description: "WoNotes — Notes & Cycle Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI components
  flutter_slidable: ^3.1.1
  animations: ^2.0.11
  google_fonts: ^6.2.1
  table_calendar: ^3.1.3

  # Utilities
  share_plus: ^10.1.4
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.5

  # Encryption key storage
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
